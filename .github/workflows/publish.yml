name: publish
permissions:
  id-token: write   # required for GitHub OIDC

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name :  build
        run : |
          cd src
          cd MSvg
          dotnet tool restore
          dotnet r ci
          dotnet r pack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./src/MSvg/artifacts/*.nupkg

      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: ignatandrei


      - name: Publish to NuGet
        run: dotnet nuget push ./src/MSvg/artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json 
