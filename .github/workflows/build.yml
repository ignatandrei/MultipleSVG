name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name :  build
        run : |
          cd src
          cd MSvg
          dotnet tool restore
          dotnet r ci

      - name: Pack
        run: |
          cd src
          cd MSvg
          dotnet r pack
